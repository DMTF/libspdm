name: Code Coverage

on:
  schedule:
    - cron:  '0 8 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build - Linux
        run: |
          sudo apt-get update
          sudo apt-get install lcov
          mkdir build
          cd build
          cmake -E env CFLAGS="-DLIBSPDM_FIPS_MODE=1" cmake -DTOOLCHAIN=GCC -DTARGET=Debug -DCRYPTO=mbedtls -DGCOV=ON ..
          make -j`nproc`
          make copy_sample_key

      - name: Test
        run: |
          cd build/bin
          ./test_spdm_requester
          ./test_spdm_responder
          ./test_spdm_common
          ./test_spdm_crypt
          ./test_spdm_secured_message
          ./test_spdm_fips

      - name: Generate Coverage
        env:
          CI_COMMIT_MESSAGE: Publish code coverage.
          CI_COMMIT_AUTHOR: Continuous Integration
        run: |
          mkdir /tmp/coverage_log
          sudo sed -i \
            -e 's/#geninfo_gcov_all_blocks = 1/geninfo_gcov_all_blocks = 1/g' \
            -e 's/#genhtml_function_coverage = 1/genhtml_function_coverage = 1/g' \
            -e 's/#genhtml_branch_coverage = 1/genhtml_branch_coverage = 1/g' \
            -e 's/lcov_branch_coverage = 0/lcov_branch_coverage = 1/g' \
            /etc/lcovrc
          cat /etc/lcovrc
          lcov --capture --directory ./build --output-file coverage.info
          genhtml coverage.info --output-directory /tmp/coverage_log
          git fetch origin
          git checkout github_pages
          rm -rf ./coverage_log
          mv /tmp/coverage_log ./
          git config --global user.name "${{ env.CI_COMMIT_AUTHOR }}"
          git config --global user.email "void@void.net"
          git add -f coverage_log/\*
          git commit -am "${{ env.CI_COMMIT_MESSAGE }}"
          git reset $(git commit-tree HEAD^{tree} -m "${{ env.CI_COMMIT_MESSAGE }}")
          git push --force origin github_pages
